version: 1.0
provider:
  name: openfaas
  gateway: http://127.0.0.1:8080
functions:
  generate-password:
    lang: python3-http
    handler: ./generate-password
    image: ghcr.io/juliemontoux/generate-password:latest
    secrets:
      - db-host
      - db-user
      - db-password
      - db-name

  generate-2fa:
    lang: python3-http
    handler: ./generate-2fa
    image: ghcr.io/juliemontoux/generate-2fa:latest
    secrets:
      - db-host
      - db-user
      - db-password
      - db-name
      - mfa-key

  authenticate:
    lang: python3-http
    handler: ./authenticate
    image: ghcr.io/juliemontoux/authenticate:latest
    secrets:
      - db-host
      - db-user
      - db-password
      - db-name
      - mfa-key

